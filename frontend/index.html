<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BundaCare - Pendamping Kehamilan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            pink: {
              50: 'rgb(var(--theme-50) / <alpha-value>)',
              100: 'rgb(var(--theme-100) / <alpha-value>)',
              200: 'rgb(var(--theme-200) / <alpha-value>)',
              300: 'rgb(var(--theme-300) / <alpha-value>)',
              400: 'rgb(var(--theme-400) / <alpha-value>)',
              500: 'rgb(var(--theme-500) / <alpha-value>)',
              600: 'rgb(var(--theme-600) / <alpha-value>)',
              700: 'rgb(var(--theme-700) / <alpha-value>)',
              800: 'rgb(var(--theme-800) / <alpha-value>)',
              900: 'rgb(var(--theme-900) / <alpha-value>)',
            }
          }
        }
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
     
    :root {
      --theme-50: 253 242 248;
      --theme-100: 252 231 243;
      --theme-200: 251 207 232;
      --theme-300: 249 168 212;
      --theme-400: 244 114 182;
      --theme-500: 236 72 153;
      --theme-600: 219 39 119;
      --theme-700: 190 24 93;
      --theme-800: 157 23 77;
      --theme-900: 131 24 67;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: rgb(var(--theme-50));
      background: radial-gradient(circle at 0% 0%, rgb(var(--theme-50)) 0%, rgb(var(--theme-100)) 50%, rgb(var(--theme-200)) 100%);
      color: #1e293b;
      -webkit-tap-highlight-color: transparent; 
      min-height: 100vh;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes pulse-soft {
      0%, 100% { transform: scale(1); opacity: 1; border-color: rgba(var(--theme-400), 0.3); }
      50% { transform: scale(1.02); opacity: 0.9; border-color: rgba(var(--theme-400), 0.8); }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14% { transform: scale(1.1); }
      28% { transform: scale(1); }
      42% { transform: scale(1.1); }
      70% { transform: scale(1); }
    }

    .animate-float { animation: float 3s ease-in-out infinite; }
    .animate-pulse-soft { animation: pulse-soft 2s ease-in-out infinite; }
    .animate-heartbeat { animation: heartbeat 1.5s ease-in-out infinite; }

    .glass-morphism {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }
     
    .glass-card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .pink-gradient {
      background: linear-gradient(135deg, rgb(var(--theme-500)) 0%, rgb(var(--theme-600)) 100%);
    }

    .progress-ring-circle {
      transition: stroke-dashoffset 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgb(var(--theme-400)); border-radius: 10px; }

    .markdown-body p { margin-bottom: 0.5rem; }
    .markdown-body p:last-child { margin-bottom: 0; }
    .markdown-body ul { list-style-type: disc; padding-left: 1.25rem; margin-bottom: 0.5rem; }
    .markdown-body ol { list-style-type: decimal; padding-left: 1.25rem; margin-bottom: 0.5rem; }
    .markdown-body li { margin-bottom: 0.25rem; }
    .markdown-body strong { font-weight: 700; color: #1e293b; }
    .markdown-body a { color: rgb(var(--theme-500)); text-decoration: underline; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: 700; margin-top: 1rem; margin-bottom: 0.5rem; color: #1e293b; }
  </style>

  </head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
